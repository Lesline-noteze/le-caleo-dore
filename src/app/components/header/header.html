<header>
    <div class="logo">
        <img [src]="backgroundImage" alt="Logo Le Calao Doré">

        <span>Le Calao Doré</span>
    </div>
    <button class="burger" (click)="toggleMenu() "> ☰ </button>
    @if (isMenuOpen || !isMobile){
    <P>
        @for(link of links; track link){
        <a [class.active]="activeLink === link" (click)="setActive(link)">
            {{link}}
        </a>
        }
    </P>
    <!-- <nav>
        <a *ngFor="let link of links" (click)="scrollTo(link)" [class.active]="activeLink === link">
            {{ links }}
        </a>
    </nav> -->
    }

</header>
